<body><header>
<h2>물의광장입니다.</h2></header>
<p>대전대는 21개국 65개 대학과 교류한다. 유학생과 재학생이 어울리는 국제적 사랑방이 글로벌라운지다. 이곳 밖으로 북쪽에 계단길과 ‘물의 광장’이 있다. 물은 서로 다른 곳에서 와 합칠 뿐, 내치거나 다투지 않는다. 국내외 학생들의 어우러짐. 이는 서로 다른 물길이 만나 이룬 글로컬리제이션(glocalization)한 풍경이다.
</p>
